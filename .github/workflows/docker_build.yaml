name: Build Docker Images

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Backend Image
        run: |
          docker build \
            -t rag-backend \
            ./rag_interview

      - name: Build Frontend Image
        run: |
          docker build \
            -t rag-frontend \
            ./frontend