version: "3.9"
services:

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: rag-frontend

    ports:
      - "5173:80"

    depends_on:
      - backend



  backend:

    build:
      context: ./rag_interview
      dockerfile: Dockerfile

    container_name: rag-backend

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - redis

    restart: unless-stopped

  redis:

    image: redis:7-alpine

    container_name: rag-redis

    ports:
      - "6379:6379"

    restart: unless-stopped

    command:
      [
        "redis-server",
        "--appendonly",
        "yes"
      ]

    volumes:
      - redis_data:/data

volumes:

  redis_data: